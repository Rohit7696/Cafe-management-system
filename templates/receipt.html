{% extends "base.html" %}

{% block title %}Receipt | Luxe Cafe{% endblock %}

{% block content %}
<section class="container" style="margin-top: 5rem; min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    
    <div class="reveal" style="background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: var(--border); overflow: hidden;">
        
        <!-- Header -->
        <div style="background: linear-gradient(135deg, var(--accent-color), #f39c12); padding: 3rem 2rem; text-align: center; color: white;">
            <div style="width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                <i class="fas fa-check" style="font-size: 2.5rem; color: var(--accent-color);"></i>
            </div>
            <h2 style="font-size: 2.2rem; margin-bottom: 0.5rem;">Payment Successful</h2>
            <p style="font-size: 1.1rem; opacity: 0.9;">Thank you for your order at Luxe Cafe!</p>
        </div>

        <!-- Receipt Body -->
        <div style="padding: 2.5rem;">
            <div style="text-align: center; margin-bottom: 2rem; border-bottom: 2px dashed var(--border); padding-bottom: 2rem;">
                <p style="color: var(--text-secondary); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 0.5rem;">Order Number</p>
                <h3 id="rcpt-order-no" style="font-size: 2.5rem; font-weight: 900; letter-spacing: 3px; color: var(--text-primary);">#0000</h3>
                <div style="margin-top: 1.5rem; background: rgba(39, 174, 96, 0.1); padding: 1rem; border-radius: 12px; display: inline-block;">
                    <p style="color: #27ae60; font-weight: 700; font-size: 1.1rem;"><i class="fas fa-clock" style="margin-right: 8px;"></i> Expected Time: 10 - 15 Mins</p>
                </div>
            </div>

            <!-- Items -->
            <div id="rcpt-items" style="margin-bottom: 2rem;">
                <!-- items injected via JS -->
            </div>

            <!-- Totals -->
            <div style="border-top: 2px dashed var(--border); padding-top: 2rem; margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.8rem; font-size: 1.1rem; color: var(--text-secondary);">
                    <span>Subtotal</span>
                    <span id="rcpt-subtotal">₹0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.8rem; font-size: 1.1rem; color: var(--text-secondary);">
                    <span>GST (5%)</span>
                    <span id="rcpt-gst">₹0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.8rem; font-size: 1.1rem; color: var(--text-secondary);">
                    <span>Tip (<span id="rcpt-method">Method</span>)</span>
                    <span id="rcpt-tip">₹0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 1.5rem; font-weight: 900; font-size: 1.8rem; color: var(--text-primary);">
                    <span>Total Paid</span>
                    <span id="rcpt-total">₹0.00</span>
                </div>
            </div>

            <!-- Footer Action -->
            <div style="text-align: center;">
                <button onclick="window.location.href='/'" style="width: 100%; padding: 1.2rem; background: var(--bg-secondary); color: var(--text-primary); border: var(--border); border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: background 0.2s;">
                    Return to Menu
                </button>
            </div>
        </div>

    </div>

</section>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const orderDataJSON = localStorage.getItem('recentOrder');
        if(!orderDataJSON) {
            window.location.href = '/';
            return;
        }

        const data = JSON.parse(orderDataJSON);
        
        // Generate random order number
        document.getElementById('rcpt-order-no').textContent = '#' + Math.floor(1000 + Math.random() * 9000);

        // Inject items
        const rcptItems = document.getElementById('rcpt-items');
        data.items.forEach(item => {
            const el = document.createElement('div');
            el.style.display = 'flex';
            el.style.justifyContent = 'space-between';
            el.style.marginBottom = '1rem';
            el.style.fontSize = '1.1rem';
            el.style.fontWeight = '500';
            el.innerHTML = `<span><span style="color: var(--text-secondary); font-weight: 700;">${item.quantity}x</span> &nbsp;${item.name}</span> <span>₹${(item.price * item.quantity).toFixed(2)}</span>`;
            rcptItems.appendChild(el);
        });

        // Totals
        document.getElementById('rcpt-subtotal').textContent = `₹${data.subtotal.toFixed(2)}`;
        document.getElementById('rcpt-gst').textContent = `₹${data.gst.toFixed(2)}`;
        document.getElementById('rcpt-tip').textContent = `₹${data.tip.toFixed(2)}`;
        document.getElementById('rcpt-total').textContent = `₹${data.total.toFixed(2)}`;
        document.getElementById('rcpt-method').textContent = data.method;

    });
</script>
{% endblock %}
